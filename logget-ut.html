<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Logged out — Lean Communications</title>
<meta name="description" content="You have logged out of the VDC Innovation Week Oslo 2026 recap.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500;1,700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#002A3A; --blue80:#335564; --blue60:#5a7681;
    --green:#78BE20; --greentext:#8ed12f; --greendk:#4f8a13;
    --teal:#33A6B1;
    --rule:rgba(255,255,255,.16); --rule-strong:rgba(255,255,255,.32);
    --dur:.22s; --ease:cubic-bezier(.2,.6,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Jost',sans-serif;color:#fff;line-height:1.6;font-size:17px;font-weight:400;
    -webkit-font-smoothing:antialiased;min-height:100svh;display:flex;flex-direction:column;background:#001620;
  }
  h1,h2,h3,.display{font-family:'Barlow Semi Condensed',sans-serif;line-height:1.02;letter-spacing:-.01em}
  ::selection{background:var(--green);color:#001620}
  :focus-visible{outline:3px solid rgba(120,190,32,.55);outline-offset:3px;border-radius:4px}
  img{max-width:100%;display:block}

  .bg{position:fixed;inset:0;z-index:0;overflow:hidden}
  .bg img{width:100%;height:100%;object-fit:cover;object-position:center 28%}
  .bg::after{content:"";position:absolute;inset:0;
    background:
      linear-gradient(95deg, rgba(0,16,23,.84) 0%, rgba(0,16,23,.6) 40%, rgba(0,16,23,.2) 74%, rgba(0,16,23,.05) 100%),
      linear-gradient(180deg, rgba(0,16,23,.18) 0%, rgba(0,16,23,0) 30%, rgba(0,16,23,.34) 66%, rgba(0,16,23,.9) 100%);
  }

  header{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;
    padding:26px clamp(20px,5vw,56px)}
  header .logo{height:30px;width:auto;opacity:.96}
  .langsw{display:flex;gap:2px;background:rgba(255,255,255,.07);border:1px solid var(--rule);
    border-radius:999px;padding:3px}
  .lang-btn{font-family:'Barlow Semi Condensed';font-weight:700;font-size:12.5px;letter-spacing:.06em;
    text-transform:uppercase;color:rgba(255,255,255,.62);background:transparent;border:none;cursor:pointer;
    padding:6px 12px;border-radius:999px;transition:all var(--dur) var(--ease)}
  .lang-btn:hover{color:#fff}
  .lang-btn.on{background:#fff;color:var(--blue)}

  main{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;
    padding:24px clamp(20px,5vw,56px) 56px}
  .stage{width:100%;max-width:600px}

  .check{width:54px;height:54px;border-radius:50%;border:2px solid rgba(174,224,106,.55);
    display:flex;align-items:center;justify-content:center;margin-bottom:26px}
  .check svg{width:26px;height:26px;stroke:#aee06a;stroke-width:2.2;fill:none}

  h1{font-size:clamp(34px,5.4vw,56px);font-weight:800;letter-spacing:-.02em;margin-bottom:18px;
    text-wrap:balance;text-shadow:0 2px 30px rgba(0,16,23,.5)}
  .lead{font-size:clamp(16px,1.7vw,18.5px);color:rgba(255,255,255,.84);font-weight:300;
    max-width:50ch;margin-bottom:34px;text-wrap:pretty;text-shadow:0 1px 16px rgba(0,16,23,.5)}

  /* contact card */
  .contact{background:rgba(255,255,255,.06);border:1px solid var(--rule-strong);border-radius:10px;
    padding:24px 26px;max-width:480px}
  .contact .eyebrow{font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:.16em;
    font-weight:700;font-size:12px;color:#aee06a;margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .contact .eyebrow::before{content:"";width:26px;height:3px;background:var(--green);border-radius:2px}
  .contact p{font-size:15px;color:rgba(255,255,255,.78);font-weight:300;margin-bottom:8px;text-wrap:pretty}
  .contact .who{font-family:'Barlow Semi Condensed';font-weight:700;font-size:17px;color:#fff;
    letter-spacing:.01em;margin-bottom:18px}
  .contact .who span{color:rgba(255,255,255,.5);font-weight:500;font-size:14px}
  .methods{display:flex;flex-direction:column;gap:10px}
  .method{display:flex;align-items:center;gap:13px;color:#fff;text-decoration:none;
    padding:12px 15px;border:1px solid var(--rule);border-radius:7px;transition:all var(--dur) var(--ease)}
  .method:hover{border-color:var(--green);background:rgba(120,190,32,.08)}
  .method .ic{width:36px;height:36px;flex:none;border-radius:50%;background:rgba(174,224,106,.14);
    display:flex;align-items:center;justify-content:center}
  .method .ic svg{width:17px;height:17px;stroke:#aee06a;stroke-width:2;fill:none}
  .method .t{display:flex;flex-direction:column;line-height:1.3}
  .method .t b{font-weight:600;font-size:15.5px;letter-spacing:.01em}
  .method .t small{font-size:12.5px;color:rgba(255,255,255,.5);font-weight:300}

  .backrow{margin-top:30px}
  .back-btn{display:inline-flex;align-items:center;gap:10px;font-family:'Barlow Semi Condensed';
    font-weight:700;font-size:15px;letter-spacing:.03em;text-transform:uppercase;color:var(--blue);
    background:var(--green);border:none;border-radius:6px;padding:14px 24px;cursor:pointer;text-decoration:none;
    transition:all var(--dur) var(--ease)}
  .back-btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2.4;fill:none}
  .back-btn:hover{background:#86cd24;transform:translateY(-1px)}
  .back-btn:active{transform:translateY(1px)}

  footer{position:relative;z-index:2;padding:18px clamp(20px,5vw,56px) 26px;
    font-size:12.5px;color:rgba(255,255,255,.42);font-weight:300;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  footer .dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.32)}

  .stage>*{opacity:0;transform:translateY(14px);animation:rise .6s var(--ease) forwards}
  .stage .check{animation-delay:.04s}
  .stage h1{animation-delay:.12s}
  .stage .lead{animation-delay:.2s}
  .stage .contact{animation-delay:.28s}
  .stage .backrow{animation-delay:.36s}
  @keyframes rise{to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.stage>*{animation:none;opacity:1;transform:none}}

  @media(max-width:560px){ header{padding:18px 20px} }
</style>
</head>
<body>

<div class="bg"><img src="assets/bodo-aurora.jpg" alt=""></div>

<header>
  <img class="logo" src="assets/logo-mark-white.png" alt="Lean Communications">
  <div class="langsw" role="group" aria-label="Language">
    <button class="lang-btn" data-lang="no">NO</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="de">DE</button>
  </div>
</header>

<main>
  <div class="stage">
    <div class="check">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1 data-t="title"></h1>
    <p class="lead" data-t="lead"></p>

    <div class="contact">
      <div class="eyebrow" data-t="ctaLabel"></div>
      <p data-t="ctaText"></p>
      <div class="who">Øyvind Børstad <span>· Lean Communications</span></div>
      <div class="methods">
        <a class="method" href="mailto:oyvindb@leancommunications.no">
          <span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg></span>
          <span class="t"><b>oyvindb@leancommunications.no</b><small data-t="emailSub"></small></span>
        </a>
        <a class="method" href="tel:+4797700104">
          <span class="ic"><svg viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg></span>
          <span class="t"><b>+47 977 00 104</b><small data-t="phoneSub"></small></span>
        </a>
      </div>
    </div>

    <div class="backrow">
      <a class="back-btn" id="back" href="index.html">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span data-t="back"></span>
      </a>
    </div>
  </div>
</main>

<footer>
  <span>VDC Innovation Week · Oslo 2026</span>
  <span class="dot"></span>
  <span>Lean Communications</span>
</footer>

<script src="lc-lang.js"></script>
<script>
(function(){
  "use strict";
  var TX={
    no:{
      title:"Du er logget ut",
      lead:"Takk for at du tok turen innom. Vil du tilbake til oppsummeringen, logger du bare inn igjen.",
      ctaLabel:"Hold kontakten",
      ctaText:"Har du spørsmål, en idé, eller bare lyst til å slå av en prat? Ta gjerne kontakt med meg direkte:",
      emailSub:"Send meg en e-post",
      phoneSub:"Ring eller send melding",
      back:"Logg inn igjen"
    },
    en:{
      title:"You’re logged out",
      lead:"Thanks for stopping by. Whenever you’d like to revisit the recap, just log back in.",
      ctaLabel:"Keep in touch",
      ctaText:"Questions, an idea, or simply want to chat? Reach out to me directly:",
      emailSub:"Send me an email",
      phoneSub:"Call or text me",
      back:"Log back in"
    },
    es:{
      title:"Has cerrado sesión",
      lead:"Gracias por pasar. Cuando quieras volver al resumen, solo inicia sesión de nuevo.",
      ctaLabel:"Sigamos en contacto",
      ctaText:"¿Tienes preguntas, una idea o simplemente quieres charlar? Escríbeme directamente:",
      emailSub:"Envíame un correo",
      phoneSub:"Llámame o escríbeme",
      back:"Volver a entrar"
    },
    de:{
      title:"Du bist abgemeldet",
      lead:"Danke für deinen Besuch. Wenn du die Zusammenfassung wieder ansehen möchtest, melde dich einfach erneut an.",
      ctaLabel:"In Kontakt bleiben",
      ctaText:"Fragen, eine Idee oder einfach Lust auf ein Gespräch? Melde dich direkt bei mir:",
      emailSub:"Schreib mir eine E-Mail",
      phoneSub:"Ruf an oder schreib mir",
      back:"Erneut anmelden"
    }
  };

  // make sure the session really is cleared on this page
  try{ sessionStorage.removeItem("iwo-auth"); }catch(e){}

  var cur=window.LCLang.get();

  function apply(lang){
    cur=lang;
    var t=TX[lang]||TX.en;
    document.documentElement.lang=lang;
    document.querySelectorAll('[data-t]').forEach(function(el){
      var k=el.getAttribute('data-t');
      if(t[k]!=null) el.textContent=t[k];
    });
    document.getElementById('back').setAttribute('href','index.html?lang='+lang);
    document.querySelectorAll('.lang-btn').forEach(function(b){
      var on=b.getAttribute('data-lang')===lang;
      b.classList.toggle('on',on);
      b.setAttribute('aria-pressed',on?'true':'false');
    });
    document.title=(t.title)+" — Lean Communications";
  }

  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.addEventListener('click',function(){
      var l=b.getAttribute('data-lang');
      window.LCLang.set(l); apply(l);
    });
  });

  apply(cur);
})();
</script>
</body>
</html>
